<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>景点详情 - 中国十大旅行攻略</title>
  <meta name="description" content="查看中国热门旅行景点详细攻略信息" />
  <script type="module" src="/src/detail.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
</head>
<body class="min-h-screen bg-gray-50">

  <!-- 导航栏 -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-4">
          <a href="/" class="flex items-center gap-2 text-xl font-bold text-blue-600">
            <span>🗺️</span>
            <span class="hidden sm:inline">中国十大旅行攻略</span>
          </a>
          <span class="text-gray-300 hidden sm:inline">/</span>
          <span id="breadcrumbName" class="text-gray-500 text-sm hidden sm:inline">景点详情</span>
        </div>
        <a href="/" class="text-sm text-blue-600 hover:text-blue-700 font-medium">← 返回首页</a>
      </div>
    </div>
  </header>

  <!-- 骨架屏：加载中占位 -->
  <div id="skeleton" class="max-w-5xl mx-auto px-4 py-8">
    <div class="skeleton rounded-xl h-64 mb-8"></div>
    <div class="skeleton rounded-xl h-8 w-1/3 mb-4"></div>
    <div class="skeleton rounded-xl h-4 w-2/3 mb-2"></div>
    <div class="skeleton rounded-xl h-4 w-1/2 mb-8"></div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
      <div class="skeleton rounded-xl h-32"></div>
      <div class="skeleton rounded-xl h-32"></div>
    </div>
  </div>

  <!-- 错误状态 -->
  <div id="errorState" class="hidden max-w-5xl mx-auto px-4 py-20 text-center">
    <p class="text-6xl mb-4">😅</p>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">未找到该景点</h2>
    <p class="text-gray-500 mb-6">请检查链接是否正确，或返回首页浏览全部景点</p>
    <a href="/" class="inline-flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition">← 返回首页</a>
  </div>

  <!-- 详情内容 -->
  <div id="detailContent" class="hidden">
    <!-- Hero 区域：图片轮播 -->
    <section id="heroSection" class="relative h-64 sm:h-80 md:h-96 overflow-hidden bg-gray-200">
      <div id="imageCarousel" class="w-full h-full relative"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
      <div class="absolute bottom-6 left-4 sm:left-8 text-white">
        <div class="flex items-center gap-2 mb-2">
          <span id="heroProvince" class="px-3 py-1 rounded-full text-sm font-medium bg-white/20 backdrop-blur-sm"></span>
          <span id="heroRating" class="star-rating text-lg"></span>
          <span class="text-sm font-semibold" id="heroRatingNum"></span>
        </div>
        <h1 id="heroName" class="text-3xl sm:text-4xl font-bold"></h1>
        <p id="heroNameEn" class="text-blue-200 text-sm sm:text-base mt-1"></p>
      </div>
      <!-- 轮播指示器 -->
      <div id="carouselDots" class="absolute bottom-6 right-4 sm:right-8 flex gap-2"></div>
    </section>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col lg:flex-row gap-8">

        <!-- 左侧主体内容 -->
        <div class="flex-1 min-w-0 detail-content">
          <!-- 景点简介 -->
          <section id="summarySection">
            <h2>📖 景点简介</h2>
            <p id="detailDescription"></p>
          </section>

          <!-- 基础信息 -->
          <section id="basicInfoSection">
            <h2>ℹ️ 基本信息</h2>
            <div id="basicInfoGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6"></div>
          </section>

          <!-- 交通指南 -->
          <section id="transportSection">
            <h2>🚗 交通指南</h2>
            <div class="space-y-4" id="transportContent"></div>
          </section>

          <!-- 推荐路线 -->
          <section id="routesSection">
            <h2>🗺️ 推荐游览路线</h2>
            <div class="space-y-4" id="routesContent"></div>
          </section>

          <!-- 美食推荐 -->
          <section id="foodSection">
            <h2>🍜 美食推荐</h2>
            <div id="foodContent"></div>
          </section>

          <!-- 住宿推荐 -->
          <section id="accommodationSection">
            <h2>🏨 住宿推荐</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="accommodationContent"></div>
          </section>

          <!-- 实用贴士 -->
          <section id="tipsSection">
            <h2>💡 实用贴士</h2>
            <div id="tipsContent"></div>
          </section>
        </div>

        <!-- 右侧快速导航 -->
        <aside class="lg:w-64 shrink-0">
          <div class="sticky top-24 bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <h3 class="font-semibold text-gray-900 mb-3">📑 页面导航</h3>
            <nav class="space-y-2 text-sm" id="tocNav"></nav>
            <div class="border-t border-gray-100 mt-4 pt-4">
              <a href="/" class="text-blue-600 hover:text-blue-700 font-medium text-sm">← 返回首页</a>
            </div>
          </div>
        </aside>

      </div>
    </div>

    <!-- 相关景点推荐 -->
    <section class="bg-gray-100 py-10">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">🏷️ 相关景点推荐</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="relatedAttractions"></div>
      </div>
    </section>
  </div>

  <!-- 页脚 -->
  <footer class="bg-gray-800 text-gray-400">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-sm">© 2026 中国十大旅行攻略 · 用心探索每一段旅程</div>
  </footer>
</body>
</html>
